<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SAMBO Scoreboard - Final Complete Edition</title>
    <style>
        :root { 
            --red: #d32f2f; --blue: #1976d2; --yellow: #ffeb3b; --white: #ffffff; --black: #000000;
            --purple: #6a1b9a;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden;
            background-color: var(--black); font-family: "Helvetica Neue", Arial, sans-serif;
            color: var(--white); display: flex; justify-content: center; align-items: center; user-select: none;
        }
        #app {
            width: 1920px; height: 1080px; position: relative;
            transform-origin: center center; background-color: var(--black);
            display: flex; flex-direction: column;
        }
        .half { width: 100%; height: 50%; display: flex; }
        .red-half { background-color: var(--red); }
        .blue-half { background-color: var(--blue); border-top: 2px solid rgba(255,255,255,0.1); }

        .left-col {
            width: 1280px; height: 100%; padding: 15px 30px 15px 60px;
            display: flex; flex-direction: column;
        }
        .right-col {
            width: 640px; height: 100%; padding: 0 50px;
            display: flex; flex-direction: column; align-items: flex-end;
        }
        .red-half .right-col { justify-content: flex-start; padding-top: 40px; }
        .blue-half .right-col { justify-content: flex-start; padding-top: 225px; }

        .name-row {
            width: 100%; border-bottom: 4px solid #fff; margin-bottom: 8px;
            display: flex; align-items: stretch; gap: 0; height: 100px;
        }
        .name-input { 
            background: transparent; border: none; color: #fff; font-size: 72px; 
            font-weight: bold; outline: none; transition: color 0.3s;
            flex-shrink: 0; width: 800px; padding: 0;
        }
        .name-input.winner-highlight { color: var(--yellow); }
        .ippon-area { flex: 1; display: flex; align-items: center; padding-left: 30px; }
        .ippon-label { 
            font-size: 68px; color: var(--yellow); font-weight: bold; 
            white-space: nowrap; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); line-height: 1.0;
        }

        .main-section {
            display: flex; align-items: center; flex: 1; min-height: 0;
        }
        .score-val { 
            font-size: 440px; font-weight: 900; line-height: 0.85; 
            font-family: 'Arial Black', sans-serif; 
            margin-right: 30px; min-width: 300px; text-align: center; flex-shrink: 0;
        }
        .controls-wrapper { display: flex; align-items: center; gap: 60px; }
        .btn-controls { display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
        .btn-row { display: flex; gap: 18px; align-items: center; }

        .sub-timers { 
            display: flex; flex-direction: column; 
            gap: 10px; 
            flex-shrink: 0; align-items: center; width: 450px;
            height: 100%; 
            justify-content: center; 
        }
        .timer-display-large { 
            background: rgba(0,0,0,0.45); font-family: 'Consolas', monospace; 
            font-size: 135px; 
            padding: 0; border-radius: 12px; 
            width: 400px; 
            height: 150px; 
            display: flex; align-items: center; justify-content: center;
        }

        .warning-top { display: flex; align-items: center; gap: 25px; margin-bottom: 15px; }
        .warning-label { font-size: 36px; font-weight: bold; }
        .card-row { display: flex; gap: 15px; }
        .card { width: 110px; height: 190px; border: 4px solid #fff; border-radius: 12px; }
        .card.active { background-color: var(--yellow); box-shadow: 0 0 25px var(--yellow); border-color: var(--yellow); }
        .warning-btns { display: flex; gap: 15px; }

        .main-timer-panel {
            position: absolute; top: 50%; right: 0; transform: translateY(-50%);
            width: 640px; height: 400px; background-color: var(--black);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-left: 2px solid rgba(255,255,255,0.2); z-index: 10;
            transition: background-color 0.3s;
        }
        .main-timer-val { 
            font-size: 260px; font-family: 'Arial Black', sans-serif; font-weight: 900; 
            line-height: 1.0; margin: 0 0 5px 0;
        }
        .main-timer-panel .control-row { display: flex; gap: 10px; position: relative; }

        .mode-dropdown {
            display: none; position: absolute; bottom: 90px; left: 0;
            background: #222; border: 2px solid #fff; border-radius: 10px;
            overflow: hidden; z-index: 20; min-width: 220px;
        }
        .mode-dropdown.open { display: block; }
        .mode-option {
            padding: 18px 28px; font-size: 32px; font-weight: bold; cursor: pointer;
            color: #fff; border-bottom: 1px solid #444;
        }
        .mode-option:hover { background: rgba(255,255,255,0.15); }
        .mode-option.selected { color: var(--yellow); }

        .btn { cursor: pointer; background: transparent; color: #fff; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.1s; outline: none; }
        .btn:active { background: rgba(255,255,255,0.3); }
        
        .btn-circle { width: 70px; height: 70px; border-radius: 50%; font-size: 28px; }
        .btn-rect { width: 95px; height: 75px; border-radius: 12px; font-size: 32px; }
        .btn-yellow { color: var(--yellow); border-color: var(--yellow); }

        .ar-btn { position: absolute; bottom: 15px; left: 15px; font-size: 14px; opacity: 0.7; padding: 8px 20px; z-index: 100; }
        #jp-btn { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); z-index: 100; width: 60px; height: 60px; border-radius: 30px; background: #444; font-size: 20px; }

        #score-sheet-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; justify-content: center; align-items: center;
        }
        .sheet-container {
            width: 90%; background: #fff; display: flex; flex-direction: column;
            border: 6px solid #fff;
        }
        .sheet-data-area { display: flex; width: 100%; height: 400px; }
        .sheet-col-names { width: 320px; display: flex; flex-direction: column; flex-shrink: 0; border-right: 2px solid #fff; }
        .sheet-col-history { flex: 1; overflow-x: auto; display: flex; flex-direction: column; background: #fff; }
        .sheet-col-total { width: 320px; display: flex; flex-direction: column; flex-shrink: 0; border-left: 2px solid #fff; }
        .sheet-cell { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; }
        .red-bg { background-color: var(--red); color: var(--white); }
        .blue-bg { background-color: var(--blue); color: var(--white); }
        .history-track-wrapper { display: flex; flex-direction: column; min-width: 100%; width: max-content; height: 100%; }
        .history-row { flex: 1; display: flex; align-items: center; gap: 20px; padding: 0 30px; }
        .history-item { font-size: 60px; font-weight: bold; min-width: 90px; height: 100%; display: flex; align-items: center; justify-content: center; }
        .sheet-total-val { font-size: 100px; font-weight: 900; font-family: 'Arial Black', sans-serif; }
        .sheet-result-row { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 54px; font-weight: bold; color: var(--black); background: var(--white); border-top: 4px solid var(--black); }
        .sheet-footer-row { height: 100px; display: flex; align-items: center; justify-content: center; background: var(--white); }
        .btn-sheet-close { font-size: 36px; font-weight: bold; color: var(--black); padding: 10px 80px; cursor: pointer; background: #f0f0f0; border: 3px solid #666; border-radius: 12px; }
    </style>
</head>
<body>

<div id="app">
    <button class="btn ar-btn" onclick="allReset()">ALL RESET</button>
    <button id="jp-btn" class="btn" onclick="openScoreSheet()">JP</button>

    <div id="score-sheet-overlay">
        <div class="sheet-container">
            <div class="sheet-data-area">
                <div class="sheet-col-names">
                    <div class="sheet-cell red-bg">赤コーナー</div>
                    <div class="sheet-cell blue-bg">青コーナー</div>
                </div>
                <div class="sheet-col-history" id="sheet-scroll-area">
                    <div class="history-track-wrapper">
                        <div class="history-row red-bg" id="red-history-track"></div>
                        <div class="history-row blue-bg" id="blue-history-track"></div>
                    </div>
                </div>
                <div class="sheet-col-total">
                    <div class="sheet-cell red-bg sheet-total-val" id="sheet-red-total">0</div>
                    <div class="sheet-cell blue-bg sheet-total-val" id="sheet-blue-total">0</div>
                </div>
            </div>
            <div class="sheet-result-row" id="sheet-result-text"></div>
            <div class="sheet-footer-row">
                <button class="btn-sheet-close" onclick="closeScoreSheet()">戻</button>
            </div>
        </div>
    </div>

    <div class="half red-half">
        <div class="left-col">
            <div class="name-row">
                <input type="text" id="red-name" class="name-input" value="赤コーナー">
                <div class="ippon-area"><div id="red-ippon-txt" class="ippon-label"></div></div>
            </div>
            <div class="main-section">
                <span id="red-score" class="score-val">0</span>
                <div class="controls-wrapper">
                    <div class="btn-controls">
                        <div class="btn-row">
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('red', 1, '1')">1</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('red', 2, '2')">2</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('red', 4, '4')">4</button>
                            <button class="btn btn-circle btn-yellow" onclick="setIppon('red')">本</button>
                        </div>
                        <div class="btn-row">
                            <button class="btn btn-circle" onclick="changeScore('red', 1, '+')">＋</button>
                            <button class="btn btn-circle" onclick="changeScore('red', -1, '-')">－</button>
                            <button class="btn btn-circle" onclick="confirmResetScore('red')">R</button>
                            <button class="btn btn-circle" onclick="setDrawWin('red')">同</button>
                        </div>
                    </div>
                    <div class="sub-timers">
                        <div style="font-size: 48px; font-weight: bold; margin-bottom: 5px;">医療</div>
                        <div class="timer-display-large" id="redMed-val">2:00</div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-circle" id="btn-redMed" onclick="toggleSub('redMed')">▶</button>
                            <button class="btn btn-circle" onclick="resetSub('redMed')">R</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="right-col">
            <div class="warning-btns" style="margin-bottom: 15px;">
                <button class="btn btn-rect" onclick="disqualify('red')">失</button>
                <button class="btn btn-rect" onclick="addFoul('red')">反</button>
                <button class="btn btn-rect" onclick="addWarningBoth()">両</button>
                <button class="btn btn-rect" onclick="changeWarn('red', 1)">＋</button>
                <button class="btn btn-rect" onclick="changeWarn('red', -1)">－</button>
            </div>
            <div class="warning-top">
                <div class="warning-label">警告</div>
                <div class="card-row" id="red-cards"><div class="card"></div><div class="card"></div></div>
            </div>
        </div>
    </div>

    <div class="half blue-half">
        <div class="left-col">
            <div class="name-row">
                <input type="text" id="blue-name" class="name-input" value="青コーナー">
                <div class="ippon-area"><div id="blue-ippon-txt" class="ippon-label"></div></div>
            </div>
            <div class="main-section">
                <span id="blue-score" class="score-val">0</span>
                <div class="controls-wrapper">
                    <div class="btn-controls">
                        <div class="btn-row">
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('blue', 1, '1')">1</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('blue', 2, '2')">2</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('blue', 4, '4')">4</button>
                            <button class="btn btn-circle btn-yellow" onclick="setIppon('blue')">本</button>
                        </div>
                        <div class="btn-row">
                            <button class="btn btn-circle" onclick="changeScore('blue', 1, '+')">＋</button>
                            <button class="btn btn-circle" onclick="changeScore('blue', -1, '-')">－</button>
                            <button class="btn btn-circle" onclick="confirmResetScore('blue')">R</button>
                            <button class="btn btn-circle" onclick="setDrawWin('blue')">同</button>
                        </div>
                    </div>
                    <div class="sub-timers">
                        <div style="font-size: 48px; font-weight: bold; margin-bottom: 5px;">医療</div>
                        <div class="timer-display-large" id="blueMed-val">2:00</div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-circle" id="btn-blueMed" onclick="toggleSub('blueMed')">▶</button>
                            <button class="btn btn-circle" onclick="resetSub('blueMed')">R</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="right-col">
            <div class="warning-btns" style="margin-bottom: 15px;">
                <button class="btn btn-rect" onclick="disqualify('blue')">失</button>
                <button class="btn btn-rect" onclick="addFoul('blue')">反</button>
                <button class="btn btn-rect" onclick="addWarningBoth()">両</button>
                <button class="btn btn-rect" onclick="changeWarn('blue', 1)">＋</button>
                <button class="btn btn-rect" onclick="changeWarn('blue', -1)">－</button>
            </div>
            <div class="warning-top">
                <div class="warning-label">警告</div>
                <div class="card-row" id="blue-cards"><div class="card"></div><div class="card"></div></div>
            </div>
        </div>
    </div>

    <div class="main-timer-panel" id="main-timer-panel">
        <div id="main-clock" class="main-timer-val">3:00</div>
        <div class="control-row">
            <div id="mode-dropdown" class="mode-dropdown">
                <div class="mode-option" onclick="setMode('5min')">5分</div>
                <div class="mode-option" onclick="setMode('4min')">4分</div>
                <div class="mode-option selected" onclick="setMode('3min')">3分</div>
                <div class="mode-option" onclick="setMode('redLate')">赤遅刻</div>
                <div class="mode-option" onclick="setMode('blueLate')">青遅刻</div>
                <div class="mode-option" onclick="setMode('bothLate')">両者遅刻</div>
            </div>
            <button class="btn btn-rect" onclick="toggleDropdown()">▼</button>
            <button class="btn btn-rect" onclick="addMainTime(10)">+10s</button>
            <button class="btn btn-rect" onclick="addMainTime(1)">+1s</button>
            <button class="btn btn-rect" id="main-s-btn" onclick="toggleMain()">▶</button>
            <button class="btn btn-rect" onclick="resetMain()">R</button>
        </div>
    </div>
</div>

<script>
    let state = {
        red: { score: 0, warn: 0, ippon: false },
        blue: { score: 0, warn: 0, ippon: false },
        mainTime: 180, mainRun: false, mainMode: '3min',
        isLateMode: false, lateModeType: null,
        subs: { redMed: {v:120, r:false}, blueMed: {v:120, r:false} },
        history: [],
        firstScorer: null,
        lastWarned: null,
        foulEnded: false,
        gameEnded: false
    };

    function resizeApp() {
        const app = document.getElementById('app');
        const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        app.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeApp);
    window.addEventListener('DOMContentLoaded', resizeApp);

    let audioCtx = null;
    function beep(long) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination); o.type = 'square'; o.start();
        const d = long ? 2.5 : 0.3; g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d);
    }

    function updateStatusLabels() {
        const rL = document.getElementById('red-ippon-txt'), bL = document.getElementById('blue-ippon-txt');
        const rInp = document.getElementById('red-name'), bInp = document.getElementById('blue-name');
        let nR = "", nB = "";
        
        // 通常の得点・警告判定
        if (state.red.warn >= 2) nR = "失格"; else if (state.red.ippon || (state.red.score > state.blue.score && state.blue.warn < 2)) nR = "勝者";
        if (state.blue.warn >= 2) nB = "失格"; else if (state.blue.ippon || (state.blue.score > state.red.score && state.red.warn < 2)) nB = "勝者";
        
        // 失格（反則）フラグによる上書き
        if (state.foulEnded || state.red.warn >= 2 || state.blue.warn >= 2) {
            if (state.red.warn >= 2) { nR = "失格"; nB = "勝者"; }
            else if (state.blue.warn >= 2) { nB = "失格"; nR = "勝者"; }
            else if (state.lastWarned === 'red') { nB = "勝者"; nR = "失格"; }
            else if (state.lastWarned === 'blue') { nR = "勝者"; nB = "失格"; }
        }

        rL.innerText = nR; 
        bL.innerText = nB;

        rInp.classList.toggle('winner-highlight', nR === "勝者");
        bInp.classList.toggle('winner-highlight', nB === "勝者");
        
        if ((nR !== "" || nB !== "") && state.mainRun) { stopMain(); beep(true); }
    }

    function addFoul(side) {
        if (state[side].warn >= 2 || state.gameEnded) return;
        state[side].warn++;
        state.lastWarned = side;
        let opp = side === 'red' ? 'blue' : 'red';
        renderCards(side);
        state.history.push({ red: side === 'red' ? '〇' : '1⃣', blue: side === 'blue' ? '〇' : '1⃣' });
        changeScore(opp, 1, null);
        state.foulEnded = true;
        stopMain(); beep(true);
        updateStatusLabels();
    }

    function disqualify(side) {
        state[side].warn = 2; renderCards(side); 
        state.history.push({ red: side === 'red' ? '☒' : '', blue: side === 'blue' ? '☒' : '' });
        updateStatusLabels();
    }

    function changeScore(side, d, label) {
        if (state.gameEnded && d > 0) return;
        if (d > 0 && state.firstScorer === null && state.red.score === 0 && state.blue.score === 0) state.firstScorer = side;
        state[side].score = Math.max(0, state[side].score + d);
        document.getElementById(`${side}-score`).innerText = state[side].score;
        if (label) state.history.push({ red: side === 'red' ? label : '', blue: side === 'blue' ? label : '' });
        updateStatusLabels();
    }

    function changeWarn(side, d) {
        if (state.gameEnded && d > 0) return;
        if (d > 0 && state[side].warn < 2) {
            state[side].warn++;
            state.lastWarned = side;
            let opp = side === 'red' ? 'blue' : 'red';
            if (state[side].warn === 1) state.history.push({ red: side === 'red' ? '〇' : '0⃣', blue: side === 'blue' ? '〇' : '0⃣' });
            else if (state[side].warn === 2) { state.history.push({ red: side === 'red' ? '〇' : '1⃣', blue: side === 'blue' ? '〇' : '1⃣' }); changeScore(opp, 1, null); }
        } else if (d < 0 && state[side].warn > 0) {
            if (state[side].warn === 2) { let opp = side === 'red' ? 'blue' : 'red'; changeScore(opp, -1, null); }
            state[side].warn--;
        }
        renderCards(side); updateStatusLabels();
    }

    function addWarningBoth() {
        if (state.gameEnded) return;
        let rW = state.red.warn, bW = state.blue.warn;
        if (rW === 0 && bW === 0) { state.red.warn = 1; state.blue.warn = 1; state.lastWarned = 'both'; state.history.push({ red: '〇0⃣', blue: '〇0⃣' }); }
        else if (rW === 1 && bW === 0) { state.red.warn = 2; state.blue.warn = 1; state.lastWarned = 'red'; state.history.push({ red: '〇0⃣', blue: '〇1⃣' }); changeScore('blue', 1, null); stopMain(); beep(true); }
        else if (rW === 0 && bW === 1) { state.red.warn = 1; state.blue.warn = 2; state.lastWarned = 'blue'; state.history.push({ red: '〇1⃣', blue: '〇0⃣' }); changeScore('red', 1, null); stopMain(); beep(true); }
        else { if (state.red.warn < 2) state.red.warn++; if (state.blue.warn < 2) state.blue.warn++; state.history.push({ red: '〇', blue: '〇' }); }
        renderCards('red'); renderCards('blue'); updateStatusLabels();
    }

    function renderCards(side) {
        const cards = document.getElementById(`${side}-cards`).children;
        for (let i = 0; i < 2; i++) cards[i].classList.toggle('active', i < state[side].warn);
    }

    function setMode(m) {
        const panel = document.getElementById('main-timer-panel');
        panel.style.backgroundColor = 'var(--black)';
        state.firstScorer = null; state.lastWarned = null; state.foulEnded = false; state.gameEnded = false;
        if (['redLate', 'blueLate', 'bothLate'].includes(m)) {
            state.isLateMode = true; state.lateModeType = m; state.mainTime = 0;
            state.red.warn = 0; state.blue.warn = 0; renderCards('red'); renderCards('blue');
            if (m === 'redLate') panel.style.backgroundColor = 'var(--red)';
            if (m === 'blueLate') panel.style.backgroundColor = 'var(--blue)';
            if (m === 'bothLate') panel.style.backgroundColor = 'var(--purple)';
        } else { state.isLateMode = false; state.mainTime = parseInt(m) * 60; state.mainMode = m; }
        stopMain(); updateMainDisp(); updateStatusLabels();
        document.querySelectorAll('.mode-option').forEach(opt => opt.classList.toggle('selected', opt.getAttribute('onclick').includes("'"+m+"'")));
        document.getElementById('mode-dropdown').classList.remove('open');
    }

    function openScoreSheet() {
        const rH = document.getElementById('red-history-track'), bH = document.getElementById('blue-history-track');
        rH.innerHTML = ''; bH.innerHTML = '';
        state.history.forEach(h => {
            const rd = document.createElement('div'); rd.className = 'history-item'; rd.innerText = h.red || ''; rH.appendChild(rd);
            const bd = document.createElement('div'); bd.className = 'history-item'; bd.innerText = h.blue || ''; bH.appendChild(bd);
        });
        document.getElementById('sheet-red-total').innerText = state.red.score;
        document.getElementById('sheet-blue-total').innerText = state.blue.score;
        let resultTxt = "試合中";
        let isZeroZeroWarningEnd = (state.red.score === 0 && state.blue.score === 0 && state.red.warn < 2 && state.blue.warn < 2 && (state.red.warn > 0 || state.blue.warn > 0) && !state.mainRun && state.mainTime === 0);
        if (isZeroZeroWarningEnd) resultTxt = (state.lastWarned === 'red' ? '青' : '赤') + "コーナーの選手の警告判定勝ちです";
        else if (state.firstScorer) resultTxt = (state.firstScorer === 'red' ? '赤' : '青') + "コーナーの選手の勝利です";
        else if (state.red.score > state.blue.score || state.blue.warn >= 2 || state.red.ippon || (state.foulEnded && state.lastWarned === 'blue')) resultTxt = "赤コーナーの選手の勝利です";
        else if (state.blue.score > state.red.score || state.red.warn >= 2 || state.blue.ippon || (state.foulEnded && state.lastWarned === 'red')) resultTxt = "青コーナーの選手の勝利です";
        document.getElementById('sheet-result-text').innerText = resultTxt;
        document.getElementById('score-sheet-overlay').style.display = 'flex';
    }

    function setIppon(side) { if(state.gameEnded) return; state[side].ippon = true; state.history.push({ red: side === 'red' ? '本' : '', blue: side === 'blue' ? '本' : '' }); updateStatusLabels(); }
    function setDrawWin(side) { if(state.gameEnded) return; state.gameEnded = true; document.getElementById(`${side}-ippon-txt`).innerText = "勝者"; stopMain(); beep(true); updateStatusLabels(); }
    function closeScoreSheet() { document.getElementById('score-sheet-overlay').style.display = 'none'; }
    function toggleMain() { if(state.gameEnded) return; state.mainRun = !state.mainRun; document.getElementById('main-s-btn').innerText = state.mainRun ? "⏸" : "▶"; }
    function stopMain() { state.mainRun = false; document.getElementById('main-s-btn').innerText = "▶"; }
    function addMainTime(s) { if(!state.isLateMode) { state.mainTime += s; updateMainDisp(); } }
    function resetMain() { setMode(state.mainMode); }
    function updateMainDisp() { document.getElementById('main-clock').innerText = Math.floor(state.mainTime / 60) + ":" + String(state.mainTime % 60).padStart(2, '0'); }
    function toggleDropdown() { document.getElementById('mode-dropdown').classList.toggle('open'); }
    function toggleSub(id) { state.subs[id].r = !state.subs[id].r; document.getElementById('btn-'+id).innerText = state.subs[id].r ? "⏸" : "▶"; }
    function resetSub(id) { state.subs[id].r = false; state.subs[id].v = 120; document.getElementById(id+'-val').innerText = "2:00"; document.getElementById('btn-'+id).innerText = "▶"; }
    function allReset() { if(confirm("全てリセットしますか？")) location.reload(); }
    function confirmResetScore(side) { if(confirm("得点をリセットしますか？")) { state[side].score = 0; document.getElementById(`${side}-score`).innerText = 0; if (state.red.score === 0 && state.blue.score === 0) state.firstScorer = null; updateStatusLabels(); } }

    setInterval(() => {
        if (state.mainRun) {
            if (state.isLateMode) {
                if (state.mainTime < 60) {
                    state.mainTime++;
                    if (state.mainTime === 30) {
                        if (state.lateModeType === 'redLate') { state.red.warn = 1; state.lastWarned='red'; state.history.push({red:'〇', blue:'0⃣'}); }
                        else if (state.lateModeType === 'blueLate') { state.blue.warn = 1; state.lastWarned='blue'; state.history.push({red:'0⃣', blue:'〇'}); }
                        else if (state.lateModeType === 'bothLate') { state.red.warn = 1; state.blue.warn = 1; state.lastWarned='both'; state.history.push({red:'〇', blue:'〇'}); }
                        renderCards('red'); renderCards('blue');
                    }
                    if (state.mainTime === 60) {
                        if (state.lateModeType === 'redLate') { state.red.warn = 2; changeScore('blue', 1, null); state.history.push({red:'☒', blue:'1⃣'}); }
                        else if (state.lateModeType === 'blueLate') { state.blue.warn = 2; changeScore('red', 1, null); state.history.push({red:'1⃣', blue:'☒'}); }
                        else if (state.lateModeType === 'bothLate') { state.red.warn = 2; state.blue.warn = 2; state.history.push({red:'☒', blue:'☒'}); }
                        renderCards('red'); renderCards('blue'); stopMain(); beep(true);
                    }
                }
            } else { if (state.mainTime > 0) { state.mainTime--; if (state.mainTime === 0) { stopMain(); beep(true); updateStatusLabels(); } } }
            updateMainDisp();
        }
        for (let k in state.subs) { if (state.subs[k].r && state.subs[k].v > 0) { state.subs[k].v--; document.getElementById(k+'-val').innerText = Math.floor(state.subs[k].v / 60) + ":" + String(state.subs[k].v % 60).padStart(2, '0'); if (state.subs[k].v === 0) { state.subs[k].r = false; document.getElementById('btn-'+k).innerText = "▶"; beep(false); } } }
    }, 1000);
</script>
</body>
</html>
