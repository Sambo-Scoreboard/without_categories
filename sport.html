<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SAMBO Scoreboard - Layout Adjusted</title>
    <style>
        :root { 
            --red: #d32f2f; --blue: #1976d2; --yellow: #ffeb3b; --white: #ffffff; --black: #000000;
            --purple: #6a1b9a;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden;
            background-color: var(--black); font-family: "Helvetica Neue", Arial, sans-serif;
            color: var(--white); display: flex; justify-content: center; align-items: center; user-select: none;
        }
        #app {
            width: 1920px; height: 1080px; position: relative;
            transform-origin: center center; background-color: var(--black);
            display: flex; flex-direction: column;
        }
        .half { width: 100%; height: 50%; display: flex; }
        .red-half { background-color: var(--red); }
        .blue-half { background-color: var(--blue); border-top: 2px solid rgba(255,255,255,0.1); }

        .left-col {
            width: 1280px; height: 100%; padding: 15px 30px 15px 60px;
            display: flex; flex-direction: column;
        }
        .right-col {
            width: 640px; height: 100%; padding: 0 50px;
            display: flex; flex-direction: column; align-items: flex-end;
        }
        /* 赤コーナーの警告エリアを引き上げ */
        .red-half .right-col { justify-content: flex-start; padding-top: 40px; }
        .blue-half .right-col { justify-content: flex-start; padding-top: 225px; }

        .name-row {
            width: 100%; border-bottom: 4px solid #fff; margin-bottom: 8px;
            display: flex; align-items: stretch; gap: 0; height: 100px;
        }
        .name-input { 
            background: transparent; border: none; color: #fff; font-size: 72px; 
            font-weight: bold; outline: none; transition: color 0.3s;
            flex-shrink: 0; width: 520px; padding: 0;
        }
        .name-input.winner-highlight { color: var(--yellow); }
        .ippon-area { flex: 1; display: flex; align-items: center; padding-left: 30px; }
        .ippon-label { 
            font-size: 68px; color: var(--yellow); font-weight: bold; 
            white-space: nowrap; text-shadow: 4px 4px 10px rgba(0,0,0,0.5); line-height: 1.0;
        }

        .main-section {
            display: flex; align-items: center; flex: 1; min-height: 0;
        }
        .score-val { 
            font-size: 440px; font-weight: 900; line-height: 0.85; 
            font-family: 'Arial Black', sans-serif; 
            margin-right: 30px; min-width: 300px; text-align: center; flex-shrink: 0;
        }
        .controls-wrapper { display: flex; align-items: center; gap: 60px; }
        .btn-controls { display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
        .btn-row { display: flex; gap: 18px; align-items: center; }

        .sub-timers { 
            display: flex; flex-direction: column; gap: 22px; flex-shrink: 0;
        }
        .timer-group { display: flex; align-items: center; gap: 16px; font-weight: bold; }
        
        .timer-label { min-width: 80px; text-align: right; font-size: 40px; }
        .timer-display { 
            background: rgba(0,0,0,0.45); font-family: 'Consolas', monospace; font-size: 60px; 
            padding: 0; border-radius: 12px; width: 180px; height: 75px;
            display: flex; align-items: center; justify-content: center;
        }
        .timer-display.limit-reached { color: var(--yellow); border: 3px solid var(--yellow); }

        .warning-top { display: flex; align-items: center; gap: 25px; margin-bottom: 15px; }
        .warning-label { font-size: 36px; font-weight: bold; }
        .card-row { display: flex; gap: 15px; }
        .card { width: 110px; height: 190px; border: 4px solid #fff; border-radius: 12px; }
        .card.active { background-color: var(--yellow); box-shadow: 0 0 25px var(--yellow); border-color: var(--yellow); }
        .warning-btns { display: flex; gap: 15px; }

        .main-timer-panel {
            position: absolute; top: 50%; right: 0; transform: translateY(-50%);
            width: 640px; height: 400px; background-color: var(--black);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-left: 2px solid rgba(255,255,255,0.2); z-index: 10;
            transition: background-color 0.3s;
        }
        .main-timer-panel.late-red { background-color: var(--red); }
        .main-timer-panel.late-blue { background-color: var(--blue); }
        .main-timer-panel.late-both { background-color: var(--purple); }
        .main-timer-val { 
            font-size: 260px; font-family: 'Arial Black', sans-serif; font-weight: 900; 
            line-height: 1.0; margin: 0 0 5px 0;
        }
        .main-timer-panel .control-row { display: flex; gap: 10px; position: relative; }

        .mode-dropdown {
            display: none; position: absolute; bottom: 90px; left: 0;
            background: #222; border: 2px solid #fff; border-radius: 10px;
            overflow: hidden; z-index: 20; min-width: 220px;
        }
        .mode-dropdown.open { display: block; }
        .mode-option {
            padding: 18px 28px; font-size: 32px; font-weight: bold; cursor: pointer;
            color: #fff; border-bottom: 1px solid #444;
        }
        .mode-option:last-child { border-bottom: none; }
        .mode-option:hover { background: rgba(255,255,255,0.15); }
        .mode-option.selected { color: var(--yellow); }

        .btn { cursor: pointer; background: transparent; color: #fff; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.1s; outline: none; }
        .btn:active { background: rgba(255,255,255,0.3); }
        
        .btn-circle { width: 70px; height: 70px; border-radius: 50%; font-size: 28px; }
        .btn-ellipse { width: 100px; height: 70px; border-radius: 35px; font-size: 24px; white-space: nowrap; }
        
        .btn-rect { width: 95px; height: 75px; border-radius: 12px; font-size: 32px; }
        .btn-yellow { color: var(--yellow); border-color: var(--yellow); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .ar-btn { position: absolute; bottom: 15px; left: 15px; font-size: 14px; opacity: 0.7; padding: 8px 20px; z-index: 100; }
        .ar-btn:hover { opacity: 1.0; background: rgba(255, 255, 255, 0.1); }

        #jp-btn { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); z-index: 100; width: 60px; height: 60px; border-radius: 30px; background: #444; font-size: 20px; }

        #score-sheet-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            display: none; justify-content: center; align-items: center;
        }
        .sheet-container {
            width: 90%; background: #fff; display: flex; flex-direction: column;
            box-shadow: 0 0 80px rgba(0,0,0,0.6); border: 6px solid #fff;
        }

        .sheet-data-area { display: flex; width: 100%; height: 400px; }

        .sheet-col-names {
            width: 320px; display: flex; flex-direction: column; flex-shrink: 0;
            border-right: 2px solid #fff;
        }
        .sheet-col-history {
            flex: 1; overflow-x: auto; overflow-y: hidden; display: flex; flex-direction: column; background: #fff;
            scrollbar-color: rgba(0,0,0,0.4) transparent; scrollbar-width: thin;
        }
        .sheet-col-history::-webkit-scrollbar { height: 16px; }
        .sheet-col-history::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.4); border-radius: 8px; }

        .sheet-col-total {
            width: 320px; display: flex; flex-direction: column; flex-shrink: 0;
            border-left: 2px solid #fff;
        }

        .sheet-cell {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 48px; font-weight: bold;
        }
        .red-bg { background-color: var(--red); color: var(--white); }
        .blue-bg { background-color: var(--blue); color: var(--white); }

        .sheet-col-names .red-bg, .sheet-col-total .red-bg { border-bottom: 2px solid rgba(255,255,255,0.4); }
        
        .history-track-wrapper {
            display: flex; flex-direction: column; min-width: 100%; width: max-content; height: 100%;
        }
        .history-row {
            flex: 1; display: flex; align-items: center; gap: 20px; padding: 0 30px;
        }
        .history-row.red-bg { border-bottom: 2px solid rgba(255,255,255,0.4); }
        
        .history-item {
            font-size: 60px; font-weight: bold; min-width: 90px; height: 100%;
            display: flex; align-items: center; justify-content: center; white-space: nowrap;
        }

        .sheet-total-val { font-size: 100px; font-weight: 900; font-family: 'Arial Black', sans-serif; }

        .sheet-result-row {
            height: 120px; display: flex; align-items: center; justify-content: center;
            font-size: 60px; font-weight: bold; color: var(--black); background: var(--white);
            border-top: 4px solid var(--black); border-bottom: 2px solid #ccc;
        }

        .sheet-footer-row {
            height: 100px; display: flex; align-items: center; justify-content: center;
            background: var(--white);
        }
        .btn-sheet-close {
            font-size: 36px; font-weight: bold; color: var(--black);
            padding: 10px 80px; cursor: pointer;
            background: #f0f0f0; border: 3px solid #666; border-radius: 12px;
        }
        .btn-sheet-close:hover { background: #e0e0e0; }

    </style>
</head>
<body>

<div id="app">
    <button class="btn ar-btn" onclick="allReset()">ALL RESET</button>
    <button id="jp-btn" class="btn" onclick="openScoreSheet()">JP</button>

    <div id="score-sheet-overlay">
        <div class="sheet-container">
            <div class="sheet-data-area">
                <div class="sheet-col-names">
                    <div class="sheet-cell red-bg">赤コーナー</div>
                    <div class="sheet-cell blue-bg">青コーナー</div>
                </div>
                <div class="sheet-col-history" id="sheet-scroll-area">
                    <div class="history-track-wrapper">
                        <div class="history-row red-bg" id="red-history-track"></div>
                        <div class="history-row blue-bg" id="blue-history-track"></div>
                    </div>
                </div>
                <div class="sheet-col-total">
                    <div class="sheet-cell red-bg sheet-total-val" id="sheet-red-total">0</div>
                    <div class="sheet-cell blue-bg sheet-total-val" id="sheet-blue-total">0</div>
                </div>
            </div>
            <div class="sheet-result-row" id="sheet-result-text"></div>
            <div class="sheet-footer-row">
                <button class="btn-sheet-close" onclick="closeScoreSheet()">戻</button>
            </div>
        </div>
    </div>

    <div class="half red-half">
        <div class="left-col">
            <div class="name-row">
                <input type="text" id="red-name" class="name-input" value="赤コーナー">
                <div class="ippon-area"><div id="red-ippon-txt" class="ippon-label"></div></div>
            </div>
            <div class="main-section">
                <span id="red-score" class="score-val">0</span>
                <div class="controls-wrapper">
                    <div class="btn-controls">
                        <div class="btn-row">
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('red', 1, '1')">1</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('red', 2, '2')">2</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('red', 4, '4')">4</button>
                            <button class="btn btn-circle btn-yellow" onclick="setIppon('red')">本</button>
                        </div>
                        <div class="btn-row">
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('red', 2, '抑2')">抑2</button>
                            <button class="btn btn-ellipse" onclick="changeScore('red', -2, '-抑2')">－抑2</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('red', 4, '抑4')">抑4</button>
                        </div>
                        <div class="btn-row">
                            <button class="btn btn-circle" onclick="changeScore('red', 1, '+')">＋</button>
                            <button class="btn btn-circle" onclick="changeScore('red', -1, '-')">－</button>
                            <button class="btn btn-circle" onclick="confirmResetScore('red')">R</button>
                            <button class="btn btn-circle" onclick="setDrawWin('red')">同</button>
                        </div>
                    </div>
                    <div class="sub-timers">
                        <div class="timer-group"><span class="timer-label">抑込</span><div id="redOsae-val" class="timer-display">0</div><button class="btn btn-circle" id="btn-redOsae" onclick="toggleSub('redOsae')">▶</button><button class="btn btn-circle" onclick="resetSub('redOsae')">R</button></div>
                        <div class="timer-group"><span class="timer-label">関節</span><div id="redKan-val" class="timer-display">0</div><button class="btn btn-circle" id="btn-redKan" onclick="toggleSub('redKan')">▶</button><button class="btn btn-circle" onclick="resetSub('redKan')">R</button></div>
                        <div class="timer-group"><span class="timer-label">医療</span><div id="redMed-val" class="timer-display">2:00</div><button class="btn btn-circle" id="btn-redMed" onclick="toggleSub('redMed')">▶</button><button class="btn btn-circle" onclick="resetSub('redMed')">R</button></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="right-col">
            <div class="warning-btns" style="margin-bottom: 15px;">
                <button class="btn btn-rect" onclick="disqualify('red')">失</button>
                <button class="btn btn-rect" onclick="addFoul('red')">反</button>
                <button class="btn btn-rect" onclick="addWarningBoth()">両</button>
                <button class="btn btn-rect" onclick="changeWarn('red', 1)">＋</button>
                <button class="btn btn-rect" onclick="changeWarn('red', -1)">－</button>
            </div>
            <div class="warning-top">
                <div class="warning-label">警告</div>
                <div class="card-row" id="red-cards"><div class="card"></div><div class="card"></div><div class="card"></div><div class="card"></div></div>
            </div>
        </div>
    </div>

    <div class="half blue-half">
        <div class="left-col">
            <div class="name-row">
                <input type="text" id="blue-name" class="name-input" value="青コーナー">
                <div class="ippon-area"><div id="blue-ippon-txt" class="ippon-label"></div></div>
            </div>
            <div class="main-section">
                <span id="blue-score" class="score-val">0</span>
                <div class="controls-wrapper">
                    <div class="btn-controls">
                        <div class="btn-row">
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('blue', 1, '1')">1</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('blue', 2, '2')">2</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('blue', 4, '4')">4</button>
                            <button class="btn btn-circle btn-yellow" onclick="setIppon('blue')">本</button>
                        </div>
                        <div class="btn-row">
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('blue', 2, '抑2')">抑2</button>
                            <button class="btn btn-ellipse" onclick="changeScore('blue', -2, '-抑2')">－抑2</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('blue', 4, '抑4')">抑4</button>
                            <button class="btn btn-circle btn-yellow" onclick="changeScore('blue', 4, '4D')">4D</button>
                        </div>
                        <div class="btn-row">
                            <button class="btn btn-circle" onclick="changeScore('blue', 1, '+')">＋</button>
                            <button class="btn btn-circle" onclick="changeScore('blue', -1, '-')">－</button>
                            <button class="btn btn-circle" onclick="confirmResetScore('blue')">R</button>
                            <button class="btn btn-circle" onclick="setDrawWin('blue')">同</button>
                        </div>
                    </div>
                    <div class="sub-timers">
                        <div class="timer-group"><span class="timer-label">抑込</span><div id="blueOsae-val" class="timer-display">0</div><button class="btn btn-circle" id="btn-blueOsae" onclick="toggleSub('blueOsae')">▶</button><button class="btn btn-circle" onclick="resetSub('blueOsae')">R</button></div>
                        <div class="timer-group"><span class="timer-label">関節</span><div id="blueKan-val" class="timer-display">0</div><button class="btn btn-circle" id="btn-blueKan" onclick="toggleSub('blueKan')">▶</button><button class="btn btn-circle" onclick="resetSub('blueKan')">R</button></div>
                        <div class="timer-group"><span class="timer-label">医療</span><div id="blueMed-val" class="timer-display">2:00</div><button class="btn btn-circle" id="btn-blueMed" onclick="toggleSub('blueMed')">▶</button><button class="btn btn-circle" onclick="resetSub('blueMed')">R</button></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="right-col">
            <div class="warning-btns" style="margin-bottom: 15px;">
                <button class="btn btn-rect" onclick="disqualify('blue')">失</button>
                <button class="btn btn-rect" onclick="addFoul('blue')">反</button>
                <button class="btn btn-rect" onclick="addWarningBoth()">両</button>
                <button class="btn btn-rect" onclick="changeWarn('blue', 1)">＋</button>
                <button class="btn btn-rect" onclick="changeWarn('blue', -1)">－</button>
            </div>
            <div class="warning-top">
                <div class="warning-label">警告</div>
                <div class="card-row" id="blue-cards"><div class="card"></div><div class="card"></div><div class="card"></div><div class="card"></div></div>
            </div>
        </div>
    </div>

    <div class="main-timer-panel" id="main-timer-panel">
        <div id="main-clock" class="main-timer-val">4:00</div>
        <div class="control-row">
            <div id="mode-dropdown" class="mode-dropdown">
                <div class="mode-option selected" onclick="setMode('4min')">4分</div>
                <div class="mode-option" onclick="setMode('3min')">3分</div>
<div class="mode-option" onclick="setMode('2min')">2分</div>
            </div>
            <button class="btn btn-rect" onclick="toggleDropdown()">▼</button>
            <button class="btn btn-rect" id="main-s-btn" onclick="toggleMain()">▶</button>
            <button class="btn btn-rect" onclick="resetMain()">R</button>
        </div>
    </div>
</div>

<script>
    function resizeApp() {
        const app = document.getElementById('app');
        const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
        app.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeApp);
    window.addEventListener('DOMContentLoaded', resizeApp);

    let state = {
        red: { score: 0, warn: 0, ippon: false, techScore: 0, count4: 0, count2: 0, foulCount: 0, count4D: 0 },
        blue: { score: 0, warn: 0, ippon: false, techScore: 0, count4: 0, count2: 0, foulCount: 0, count4D: 0 },
        mainTime: 240, mainRun: false, mainMode: '4min',
        subs: { 
            redOsae: {v:0, r:false, max:20, type:'up'}, blueOsae: {v:0, r:false, max:20, type:'up'}, 
            redKan: {v:0, r:false, max:60, type:'up'}, blueKan: {v:0, r:false, max:60, type:'up'},
            redMed: {v:120, r:false, max:0, type:'down'}, blueMed: {v:120, r:false, max:0, type:'down'} 
        },
        history: [],
        lastTechScorer: null,
        lastWarned: null
    };

    let audioCtx = null;
    function beep(long) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination); o.type = 'square'; o.frequency.value = 440;
        o.start(); const d = long ? 2.5 : 0.3;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d);
    }

    function formatMinSec(s) {
        const min = Math.floor(s / 60); const sec = s % 60;
        return `${min}:${String(sec).padStart(2, '0')}`;
    }

    function isLateMode() {
        return state.mainMode === 'red_late' || state.mainMode === 'blue_late' || state.mainMode === 'both_late';
    }

    function toggleDropdown() { document.getElementById('mode-dropdown').classList.toggle('open'); }

    function setMode(mode) {
        state.mainMode = mode; 
        stopMain();
        
        const panel = document.getElementById('main-timer-panel');
        panel.classList.remove('late-red', 'late-blue', 'late-both');

        if (isLateMode()) {
            state.mainTime = 0;
            if (mode === 'red_late') panel.classList.add('late-red');
            if (mode === 'blue_late') panel.classList.add('late-blue');
            if (mode === 'both_late') panel.classList.add('late-both');
            
            if (mode.includes('red') || mode.includes('both')) { state.red.warn = 0; renderCards('red'); }
            if (mode.includes('blue') || mode.includes('both')) { state.blue.warn = 0; renderCards('blue'); }
        } else {
            state.mainTime = ['4min','3min','2min'].includes(mode) ? parseInt(mode)*60 : 0;
        }
        
        updateMainDisp();
        document.getElementById('mode-dropdown').classList.remove('open');
        updateStatusLabels();
    }

    function renderCards(side) {
        const count = state[side].warn;
        const cards = document.getElementById(`${side}-cards`).children;
        for (let i = 0; i < 4; i++) cards[i].classList.toggle('active', i < count);
    }

    function updateStatusLabels() {
        const rL = document.getElementById('red-ippon-txt'), bL = document.getElementById('blue-ippon-txt');
        let newRedText = "";
        let newBlueText = "";

        if (state.red.warn >= 4) { newRedText = "失格"; } 
        else if (state.red.ippon) { newRedText = "一本勝ち"; } 
        else if (state.red.score - state.blue.score >= 8 || state.red.count4D >= 2) { newRedText = "テクニカル一本勝ち"; }

        if (state.blue.warn >= 4) { newBlueText = "失格"; } 
        else if (state.blue.ippon) { newBlueText = "一本勝ち"; } 
        else if (state.blue.score - state.red.score >= 8 || state.blue.count4D >= 2) { newBlueText = "テクニカル一本勝ち"; }

        const prevRed = rL.innerText;
        const prevBlue = bL.innerText;

        rL.innerText = newRedText;
        bL.innerText = newBlueText;

        if ((newRedText !== "" && newRedText !== prevRed) || (newBlueText !== "" && newBlueText !== prevBlue)) {
            if (newRedText.includes("勝ち") || newRedText === "失格" || newBlueText.includes("勝ち") || newBlueText === "失格") {
                beep(true); stopMain();
            }
        }
        updateNameColors();
    }

    function updateNameColors() {
        const rn = document.getElementById('red-name'), bn = document.getElementById('blue-name');
        const rl = document.getElementById('red-ippon-txt').innerText, bl = document.getElementById('blue-ippon-txt').innerText;
        rn.classList.toggle('winner-highlight', rl.includes("勝ち") || bl.includes("失格"));
        bn.classList.toggle('winner-highlight', bl.includes("勝ち") || rl.includes("失格"));
    }

    function recordHistory(side, typeLabel) {
        const map = { 
            '1':'1', '2':'2', '4':'4', 'ippon':'一本',
            '抑2':'②', '-抑2':'－②', '抑4':'④', '4D':'4D',
            '+':'調1', '-':'－調1', 'Reset':'R' 
        };
        
        let entry = { red: '', blue: '' };
        const opponent = side === 'red' ? 'blue' : 'red';
        
        if (typeLabel === 'warn1') {
            entry[side] = '〇'; entry[opponent] = '0⃣';
        } else if (typeLabel === 'warn2' || typeLabel === 'warn3') {
            entry[side] = '〇'; entry[opponent] = '1⃣';
        } else if (typeLabel === 'warn4' || typeLabel === 'DQ') {
            entry[side] = '☒'; entry[opponent] = '';
        } else {
            entry[side] = map[typeLabel] || typeLabel;
            entry[opponent] = '';
        }
        if (entry.red !== '' || entry.blue !== '') state.history.push(entry);
    }

    function disqualify(side) {
        if (state[side].warn >= 4) return;
        state[side].warn = 4;
        recordHistory(side, 'DQ');
        renderCards(side);
        updateStatusLabels();
    }

    function changeScore(side, d, typeLabel) {
        state[side].score = Math.max(0, state[side].score + d);
        if (typeLabel && !typeLabel.includes('warn') && typeLabel !== 'ippon' && typeLabel !== 'Reset') {
            state[side].techScore = Math.max(0, state[side].techScore + d);
            if (['4', '抑4', '4D'].includes(typeLabel)) state[side].count4 += (d > 0 ? 1 : -1);
            if (typeLabel === '4D') state[side].count4D += (d > 0 ? 1 : -1);
            if (['2', '抑2', '-抑2'].includes(typeLabel)) state[side].count2 += (d > 0 ? 1 : -1);
            if (d > 0) state.lastTechScorer = side;
        }
        const scoreEl = document.getElementById(`${side}-score`);
        scoreEl.innerText = state[side].score;
        scoreEl.style.fontSize = state[side].score >= 10 ? '200px' : '440px';
        if (typeLabel) recordHistory(side, typeLabel);
        updateStatusLabels();
    }

    function confirmResetScore(side) {
        if (confirm(`${side === 'red' ? '赤' : '青'}コーナーの得点をリセットしますか？`)) {
            state[side].score = 0; state[side].ippon = false; state[side].techScore = 0; state[side].count4 = 0; state[side].count2 = 0; state[side].count4D = 0;
            const scoreEl = document.getElementById(`${side}-score`);
            scoreEl.innerText = 0;
            scoreEl.style.fontSize = '440px';
            recordHistory(side, 'Reset'); updateStatusLabels();
        }
    }

    function addWarningBoth() {
        if (state.red.warn < 4 && state.blue.warn < 4) {
            state.red.warn++;
            state.blue.warn++;
            const rW = state.red.warn;
            const bW = state.blue.warn;
            
            if (rW === 2 || rW === 3) changeScore('blue', 1, null);
            if (bW === 2 || bW === 3) changeScore('red', 1, null);

            const selfMap = { 1: '〇', 2: '〇', 3: '〇', 4: '☒' };
            const oppMap = { 1: '0⃣', 2: '1⃣', 3: '1⃣', 4: '' };

            state.history.push({
                red: selfMap[rW] + (oppMap[bW] || ''),
                blue: selfMap[bW] + (oppMap[rW] || '')
            });

            renderCards('red');
            renderCards('blue');
            updateStatusLabels();
        }
    }

    function addFoul(side) {
        if (state[side].warn >= 4) return;
        state[side].foulCount++;
        const opponent = side === 'red' ? 'blue' : 'red';

        if (state[side].foulCount >= 2 || state[side].warn >= 3) {
            state[side].warn = 4;
            state.history.push({
                red: side === 'red' ? '☒' : '',
                blue: side === 'blue' ? '☒' : ''
            });
        } else {
            state[side].warn++;
            changeScore(opponent, 1, null);
            state.history.push({
                red: side === 'red' ? '反' : '1',
                blue: side === 'blue' ? '反' : '1'
            });
        }
        renderCards(side);
        updateStatusLabels();
    }

    function changeWarn(side, d) {
        const opponent = side === 'red' ? 'blue' : 'red';

        if (d < 0) {
            if (state[side].warn > 0) {
                const current = state[side].warn;
                if (current === 2 || current === 3) {
                    changeScore(opponent, -1, null);
                }
                for (let i = state.history.length - 1; i >= 0; i--) {
                    if (state.history[i][side] === '〇' || state.history[i][side] === '☒' || state.history[i][side] === '反') {
                        state.history.splice(i, 1);
                        break;
                    }
                }
                state[side].warn--;
            }
        } else {
            if (state[side].warn < 4) {
                state[side].warn++;
                const current = state[side].warn;
                state.lastWarned = side;
                if (current === 1) {
                    recordHistory(side, 'warn1');
                } else if (current === 2) {
                    changeScore(opponent, 1, null);
                    recordHistory(side, 'warn2');
                } else if (current === 3) {
                    changeScore(opponent, 1, null);
                    recordHistory(side, 'warn3');
                } else if (current === 4) {
                    recordHistory(side, 'warn4');
                }
            }
        }
        renderCards(side);
        updateStatusLabels();
    }

    function checkLateWarnings() {
        const time = state.mainTime;
        const targets = [];
        if (state.mainMode === 'red_late' || state.mainMode === 'both_late') targets.push('red');
        if (state.mainMode === 'blue_late' || state.mainMode === 'both_late') targets.push('blue');

        targets.forEach(side => {
            if (time === 30 && state[side].warn < 1) changeWarn(side, 1);
            if (time === 60 && state[side].warn < 2) changeWarn(side, 1);
            if (time === 90 && state[side].warn < 3) changeWarn(side, 1);
            if (time === 120 && state[side].warn < 4) changeWarn(side, 1);
        });
    }

    function getMatchResultText() {
        const r = state.red; const b = state.blue;
        if (r.warn >= 4) return "赤コーナーの選手の失格で青コーナーの選手の勝利です";
        if (b.warn >= 4) return "青コーナーの選手の失格で赤コーナーの選手の勝利です";
        if (r.ippon) return "赤コーナーの選手の一本勝ちです";
        if (b.ippon) return "青コーナーの選手の一本勝ちです";
        if (r.score - b.score >= 8 || r.count4D >= 2) return "赤コーナーの選手のテクニカル一本勝ちです";
        if (b.score - r.score >= 8 || b.count4D >= 2) return "青コーナーの選手のテクニカル一本勝ちです";
        if (r.score > b.score) return "赤コーナーの選手のポイント判定勝ちです";
        if (b.score > r.score) return "青コーナーの選手のポイント判定勝ちです";

        if (r.score === b.score) {
            if (r.techScore > b.techScore) return "赤コーナーの選手のテクニカルポイント差勝ちです";
            if (b.techScore > r.techScore) return "青コーナーの選手のテクニカルポイント差勝ちです";
            if (r.techScore === b.techScore) {
                if (r.count4 > b.count4) return "赤コーナーの選手のビックポイント差勝ちです";
                if (b.count4 > r.count4) return "青コーナーの選手のビックポイント差勝ちです";
                if (r.count4 === b.count4) {
                    if (r.count2 > b.count2) return "赤コーナーの選手のビックポイント差勝ちです";
                    if (b.count2 > r.count2) return "青コーナーの選手のビックポイント差勝ちです";
                    if (r.count2 === b.count2) {
                        if (state.lastTechScorer === 'red') return "赤コーナーの選手のラストテクニカルポイント判定勝ちです";
                        if (state.lastTechScorer === 'blue') return "青コーナーの選手のラストテクニカルポイント判定勝ちです";
                        if (r.techScore === 0 && b.techScore === 0) {
                            if (state.lastWarned === 'blue') return "赤コーナーの選手の警告判定勝ちです";
                            if (state.lastWarned === 'red') return "青コーナーの選手の警告判定勝ちです";
                        }
                    }
                }
            }
        }
        return "";
    }

    function openScoreSheet() {
        const rH = document.getElementById('red-history-track');
        const bH = document.getElementById('blue-history-track');
        rH.innerHTML = ''; bH.innerHTML = '';
        state.history.forEach(h => {
            const rd = document.createElement('div'); rd.className = 'history-item'; rd.innerText = h.red; rH.appendChild(rd);
            const bd = document.createElement('div'); bd.className = 'history-item'; bd.innerText = h.blue; bH.appendChild(bd);
        });
        document.getElementById('sheet-red-total').innerText = state.red.warn >= 4 ? "失格" : (state.red.ippon ? "一本" : state.red.score);
        document.getElementById('sheet-blue-total').innerText = state.blue.warn >= 4 ? "失格" : (state.blue.ippon ? "一本" : state.blue.score);
        document.getElementById('sheet-result-text').innerText = getMatchResultText();
        document.getElementById('score-sheet-overlay').style.display = 'flex';
        const scrollArea = document.getElementById('sheet-scroll-area');
        setTimeout(() => { scrollArea.scrollLeft = scrollArea.scrollWidth; }, 50);
    }

    function closeScoreSheet() { document.getElementById('score-sheet-overlay').style.display = 'none'; }
    function setIppon(side) { state[side].ippon = true; recordHistory(side, 'ippon'); updateStatusLabels(); }
    function setDrawWin(side) { document.getElementById(`${side}-ippon-txt`).innerText = "判定勝ち"; beep(true); stopMain(); updateNameColors(); }
    function toggleMain() { state.mainRun = !state.mainRun; document.getElementById('main-s-btn').innerText = state.mainRun ? "⏸" : "▶"; }
    function stopMain() { state.mainRun = false; document.getElementById('main-s-btn').innerText = "▶"; }
    function addMainTime(s) { state.mainTime += s; updateMainDisp(); }
    function resetMain() { setMode(state.mainMode); }
    function updateMainDisp() { document.getElementById('main-clock').innerText = formatMinSec(state.mainTime); }
    function toggleSub(id) { state.subs[id].r = !state.subs[id].r; document.getElementById('btn-'+id).innerText = state.subs[id].r ? "⏸" : "▶"; }
    function resetSub(id) { state.subs[id].r = false; state.subs[id].v = state.subs[id].type==='up' ? 0 : 120; document.getElementById(id+'-val').innerText = state.subs[id].type==='up' ? 0 : "2:00"; document.getElementById('btn-'+id).innerText = "▶"; }
    function allReset() { if(confirm("全てリセットしますか？")) location.reload(); }

    setInterval(() => {
        if (state.mainRun) {
            if (isLateMode()) {
                if (state.mainTime < 120) {
                    state.mainTime++;
                    updateMainDisp();
                    checkLateWarnings();
                    if (state.mainTime >= 120) { stopMain(); beep(true); }
                }
            } else {
                if (state.mainTime > 0) {
                    state.mainTime--;
                    updateMainDisp();
                    if (state.mainTime === 0) { stopMain(); beep(true); }
                }
            }
        }
        for (let k in state.subs) {
            let t = state.subs[k];
            if (t.r) {
                t.v += t.type==='up' ? 1 : -1;
                document.getElementById(k+'-val').innerText = t.type==='up' ? t.v : formatMinSec(t.v);
                if ((t.type==='up' && t.v>=t.max) || (t.type==='down' && t.v<=0)) { t.r = false; beep(true); document.getElementById('btn-'+k).innerText = "▶"; }
            }
        }
    }, 1000);
</script>
</body>
</html>
